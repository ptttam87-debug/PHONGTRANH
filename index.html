<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Phòng Tranh 3D Ảo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Ngăn trình duyệt cuộn khi vuốt */
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .title {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #ccc;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        .start-btn:hover {
            background-color: #dddddd;
            transform: scale(1.05);
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        /* Nút điều khiển cho thiết bị di động */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: none;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px;
            gap: 10px;
            z-index: 5;
        }

        .m-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .m-btn:active {
            background: rgba(255, 255, 255, 0.5);
        }

        #btn-w { grid-column: 2; grid-row: 1; }
        #btn-a { grid-column: 1; grid-row: 2; }
        #btn-s { grid-column: 2; grid-row: 2; }
        #btn-d { grid-column: 3; grid-row: 2; }

        @media (max-width: 768px) {
            .title { font-size: 2rem; }
            .subtitle { font-size: 1rem; padding: 0 20px; }
            #mobile-controls { display: grid; }
        }
        
        #loading {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            z-index: 5;
            opacity: 0.7;
        }
    </style>

    <!-- Import thư viện Three.js thông qua Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="ui-layer">
        <div class="title">Phòng Tranh Nghệ Thuật 3D</div>
        <div class="subtitle">
            <p>🖥️ <b>Máy tính:</b> Kéo chuột để nhìn xung quanh. Sử dụng các phím W, A, S, D để di chuyển.</p>
            <p>📱 <b>Điện thoại:</b> Vuốt màn hình để nhìn. Sử dụng các phím ảo góc dưới để đi lại.</p>
        </div>
        <button class="start-btn" id="start-btn">Vào Tham Quan</button>
    </div>

    <div id="loading">Đang tải không gian 3D...</div>
    <div id="crosshair"></div>
    <div id="canvas-container"></div>

    <!-- Nút điều khiển di động -->
    <div id="mobile-controls">
        <div class="m-btn" id="btn-w">↑</div>
        <div class="m-btn" id="btn-a">←</div>
        <div class="m-btn" id="btn-s">↓</div>
        <div class="m-btn" id="btn-d">→</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- CẤU HÌNH CƠ BẢN ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111); // Màu nền tối cho phòng tranh
        scene.fog = new THREE.Fog(0x111111, 0, 30); // Hiệu ứng sương mù tạo chiều sâu

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // Đặt camera ở độ cao tầm mắt người (1.6m)

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Tối ưu hiệu suất
        renderer.shadowMap.enabled = true; // Bật đổ bóng
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- HỆ THỐNG ĐIỀU KHIỂN (Chuột & Cảm ứng & Bàn phím) ---
        let isInteracting = false;
        let lon = 0, lat = 0; // Tọa độ cầu của camera
        let phi = 0, theta = 0;
        let onPointerDownPointerX = 0, onPointerDownPointerY = 0;
        let onPointerDownLon = 0, onPointerDownLat = 0;

        // Trạng thái di chuyển
        const moveState = { forward: false, backward: false, left: false, right: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const speed = 6.0; // Tốc độ di chuyển
        
        let prevTime = performance.now();
        let galleryStarted = false;

        // Xử lý xoay camera
        function interactStart(clientX, clientY) {
            if (!galleryStarted) return;
            isInteracting = true;
            onPointerDownPointerX = clientX;
            onPointerDownPointerY = clientY;
            onPointerDownLon = lon;
            onPointerDownLat = lat;
        }

        function interactMove(clientX, clientY) {
            if (!isInteracting || !galleryStarted) return;
            // Tính toán góc nhìn dựa trên chuyển động chuột/tay
            lon = (onPointerDownPointerX - clientX) * 0.15 + onPointerDownLon;
            lat = (clientY - onPointerDownPointerY) * 0.15 + onPointerDownLat;
        }

        function interactEnd() {
            isInteracting = false;
        }

        // Sự kiện Chuột
        container.addEventListener('mousedown', (e) => interactStart(e.clientX, e.clientY));
        container.addEventListener('mousemove', (e) => interactMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', interactEnd);

        // Sự kiện Cảm ứng (Touch)
        container.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) interactStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        container.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                e.preventDefault(); // Ngăn cuộn trang
                interactMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });
        window.addEventListener('touchend', interactEnd);

        // Sự kiện Bàn phím
        const onKeyDown = function (event) {
            switch (event.code) {
                case 'ArrowUp':
                case 'KeyW': moveState.forward = true; break;
                case 'ArrowLeft':
                case 'KeyA': moveState.left = true; break;
                case 'ArrowDown':
                case 'KeyS': moveState.backward = true; break;
                case 'ArrowRight':
                case 'KeyD': moveState.right = true; break;
            }
        };

        const onKeyUp = function (event) {
            switch (event.code) {
                case 'ArrowUp':
                case 'KeyW': moveState.forward = false; break;
                case 'ArrowLeft':
                case 'KeyA': moveState.left = false; break;
                case 'ArrowDown':
                case 'KeyS': moveState.backward = false; break;
                case 'ArrowRight':
                case 'KeyD': moveState.right = false; break;
            }
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // Sự kiện nút ảo trên Mobile
        const btnW = document.getElementById('btn-w');
        const btnA = document.getElementById('btn-a');
        const btnS = document.getElementById('btn-s');
        const btnD = document.getElementById('btn-d');

        const bindTouchBtn = (element, key) => {
            element.addEventListener('touchstart', (e) => { e.preventDefault(); moveState[key] = true; });
            element.addEventListener('touchend', (e) => { e.preventDefault(); moveState[key] = false; });
            element.addEventListener('mousedown', (e) => { moveState[key] = true; });
            element.addEventListener('mouseup', (e) => { moveState[key] = false; });
            element.addEventListener('mouseleave', (e) => { moveState[key] = false; });
        };
        bindTouchBtn(btnW, 'forward');
        bindTouchBtn(btnA, 'left');
        bindTouchBtn(btnS, 'backward');
        bindTouchBtn(btnD, 'right');


        // --- DỰNG MÔI TRƯỜNG PHÒNG TRANH ---
        const roomSize = 24;
        const wallHeight = 6;

        // Tạo chất liệu sàn nhà (Kẻ ô)
        function createFloorTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const context = canvas.getContext('2d');
            context.fillStyle = '#2c2c2c';
            context.fillRect(0, 0, 512, 512);
            context.fillStyle = '#1a1a1a';
            context.fillRect(0, 0, 256, 256);
            context.fillRect(256, 256, 256, 256);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(roomSize/2, roomSize/2);
            return texture;
        }

        // Sàn nhà
        const floorGeo = new THREE.PlaneGeometry(roomSize, roomSize);
        const floorMat = new THREE.MeshStandardMaterial({ 
            map: createFloorTexture(),
            roughness: 0.8,
            metalness: 0.2
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Trần nhà
        const ceilingGeo = new THREE.PlaneGeometry(roomSize, roomSize);
        const ceilingMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 1.0 });
        const ceiling = new THREE.Mesh(ceilingGeo, ceilingMat);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = wallHeight;
        scene.add(ceiling);

        // Tường nhà
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.9 });
        function createWall(x, y, z, rotY) {
            const wallGeo = new THREE.PlaneGeometry(roomSize, wallHeight);
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(x, y, z);
            wall.rotation.y = rotY;
            wall.receiveShadow = true;
            scene.add(wall);
        }
        createWall(0, wallHeight/2, -roomSize/2, 0); // Tường Bắc
        createWall(0, wallHeight/2, roomSize/2, Math.PI); // Tường Nam
        createWall(-roomSize/2, wallHeight/2, 0, Math.PI/2); // Tường Tây
        createWall(roomSize/2, wallHeight/2, 0, -Math.PI/2); // Tường Đông


        // --- ÁNH SÁNG ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2); // Ánh sáng môi trường nhẹ
        scene.add(ambientLight);

        // Một đèn chùm chính giữa phòng
        const centerLight = new THREE.PointLight(0xfff0dd, 0.5, 20);
        centerLight.position.set(0, wallHeight - 0.5, 0);
        scene.add(centerLight);

        // --- TÁC PHẨM NGHỆ THUẬT ---
        const textureLoader = new THREE.TextureLoader();
        
        // Danh sách các bức tranh (sử dụng Unsplash làm placeholder chất lượng cao)
        const artworks = [
            { url: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=600&q=80', width: 2.5, height: 3.5, pos: [-4, 2.5, -roomSize/2 + 0.1], rot: [0, 0, 0] },
            { url: 'https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?w=800&q=80', width: 4.0, height: 2.5, pos: [4, 2.5, -roomSize/2 + 0.1], rot: [0, 0, 0] },
            
            { url: 'https://images.unsplash.com/photo-1580136579312-94651dfd596d?w=600&q=80', width: 3.0, height: 4.0, pos: [-5, 2.5, roomSize/2 - 0.1], rot: [0, Math.PI, 0] },
            { url: 'https://images.unsplash.com/photo-1563693838495-2ebcdfae9c7c?w=600&q=80', width: 3.0, height: 2.0, pos: [5, 2.5, roomSize/2 - 0.1], rot: [0, Math.PI, 0] },

            { url: 'https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=800&q=80', width: 4.5, height: 2.5, pos: [-roomSize/2 + 0.1, 2.5, 0], rot: [0, Math.PI/2, 0] },
            { url: 'https://images.unsplash.com/photo-1578301978693-85fa9c026f19?w=600&q=80', width: 2.5, height: 2.5, pos: [roomSize/2 - 0.1, 2.5, -4], rot: [0, -Math.PI/2, 0] },
            { url: 'https://images.unsplash.com/photo-1536924430914-91f9e2041b83?w=600&q=80', width: 3.0, height: 4.0, pos: [roomSize/2 - 0.1, 2.5, 4], rot: [0, -Math.PI/2, 0] }
        ];

        let loadedImages = 0;
        const loadingText = document.getElementById('loading');

        artworks.forEach((art) => {
            // Khung tranh
            const frameThickness = 0.1;
            const frameWidth = 0.2;
            const frameGeo = new THREE.BoxGeometry(art.width + frameWidth, art.height + frameWidth, frameThickness);
            const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            frame.position.set(art.pos[0], art.pos[1], art.pos[2]);
            frame.rotation.set(art.rot[0], art.rot[1], art.rot[2]);
            frame.castShadow = true;
            scene.add(frame);

            // Bức tranh (Texture)
            textureLoader.load(art.url, (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;
                const picGeo = new THREE.PlaneGeometry(art.width, art.height);
                const picMat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.4 });
                const pic = new THREE.Mesh(picGeo, picMat);
                // Đặt bức tranh nổi lên trên khung một chút
                pic.position.z = frameThickness / 2 + 0.01;
                frame.add(pic);

                loadedImages++;
                if(loadedImages === artworks.length) {
                    loadingText.innerText = "Tải hoàn tất! Sẵn sàng tham quan.";
                    setTimeout(() => { loadingText.style.display = 'none'; }, 2000);
                }
            });

            // Đèn rọi (Spotlight) cho từng bức tranh
            const spotLight = new THREE.SpotLight(0xfff5e6, 2.5); // Ánh sáng vàng ấm
            // Vị trí đèn chiếu từ trên xuống chéo vào tranh
            const offsetZ = art.rot[1] === 0 ? 3 : (art.rot[1] === Math.PI ? -3 : 0);
            const offsetX = art.rot[1] === Math.PI/2 ? 3 : (art.rot[1] === -Math.PI/2 ? -3 : 0);
            
            spotLight.position.set(art.pos[0] + offsetX, art.pos[1] + 2.5, art.pos[2] + offsetZ);
            spotLight.angle = Math.PI / 5;
            spotLight.penumbra = 0.5;
            spotLight.decay = 2;
            spotLight.distance = 10;
            spotLight.castShadow = true;
            
            scene.add(spotLight);

            // Mục tiêu của đèn rọi là tâm bức tranh
            const targetObj = new THREE.Object3D();
            targetObj.position.set(art.pos[0], art.pos[1], art.pos[2]);
            scene.add(targetObj);
            spotLight.target = targetObj;
        });


        // --- QUẢN LÝ RESIZE MÀN HÌNH ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // Xử lý ẩn/hiện nút điều khiển di động dựa trên kích thước màn hình
            if (window.innerWidth > 768) {
                document.getElementById('mobile-controls').style.display = 'none';
            } else if (galleryStarted) {
                document.getElementById('mobile-controls').style.display = 'grid';
            }
        }

        // --- KHỞI ĐỘNG ---
        const startBtn = document.getElementById('start-btn');
        const uiLayer = document.getElementById('ui-layer');
        const crosshair = document.getElementById('crosshair');

        startBtn.addEventListener('click', () => {
            uiLayer.style.opacity = '0';
            setTimeout(() => {
                uiLayer.style.display = 'none';
                crosshair.style.display = 'block';
                galleryStarted = true;
                
                // Hiển thị nút ảo nếu là màn hình nhỏ
                if (window.innerWidth <= 768) {
                    document.getElementById('mobile-controls').style.display = 'grid';
                }
            }, 500);
        });

        // --- VÒNG LẶP HOẠT ẢNH & LOGIC VẬT LÝ ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            prevTime = time;

            if (galleryStarted) {
                // Giới hạn góc nhìn lên xuống (tránh lật camera)
                lat = Math.max(-85, Math.min(85, lat));
                phi = THREE.MathUtils.degToRad(90 - lat);
                theta = THREE.MathUtils.degToRad(lon);

                // Tính toán điểm nhìn tiếp theo của camera
                const target = new THREE.Vector3();
                target.x = camera.position.x + 100 * Math.sin(phi) * Math.cos(theta);
                target.y = camera.position.y + 100 * Math.cos(phi);
                target.z = camera.position.z + 100 * Math.sin(phi) * Math.sin(theta);
                camera.lookAt(target);

                // --- Xử lý di chuyển ---
                // Lấy hướng mà camera đang nhìn (chỉ trên mặt phẳng X-Z)
                camera.getWorldDirection(direction);
                direction.y = 0; 
                direction.normalize();

                // Vector vuông góc để di chuyển sang trái/phải
                const rightDir = new THREE.Vector3().crossVectors(camera.up, direction).normalize();

                // Áp dụng di chuyển dựa trên Input
                velocity.set(0, 0, 0);
                if (moveState.forward) velocity.add(direction);
                if (moveState.backward) velocity.sub(direction);
                if (moveState.right) velocity.sub(rightDir);
                if (moveState.left) velocity.add(rightDir);

                velocity.normalize().multiplyScalar(speed * delta);
                camera.position.add(velocity);

                // --- Va chạm với tường (Collision) ---
                const bounds = (roomSize / 2) - 1.0; // Giới hạn tường trừ đi một chút đệm
                camera.position.x = Math.max(-bounds, Math.min(bounds, camera.position.x));
                camera.position.z = Math.max(-bounds, Math.min(bounds, camera.position.z));
            }

            renderer.render(scene, camera);
        }

        // Bắt đầu vòng lặp
        animate();
    </script>
</body>
</html>
